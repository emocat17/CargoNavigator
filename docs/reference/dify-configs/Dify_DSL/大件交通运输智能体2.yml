            type: constant
            value: "\n**大件运输任务审批申请**\n\n尊敬的交通保障中心领导：\n\n现呈报一项大件运输任务申请，恳请审阅与批复。任务核心信息如下：\n\
              \n**一、 任务基本信息**\n- **运输起点：** xx\n- **运输终点：** xx\n- **车辆类型：** xx\n- **车货总重：**\
              \ xx吨\n- **车辆外廓尺寸：** 长xx米 × 宽xx米 × 高xx米\n- **货物信息：** xx（货物名称），重xx吨\n\
              - **计划运输时段：** xx年xx月月xx日xx点 至 xx年xx月xx日xx点\n\n**二、 推荐路线及综合分析**\n为保障运输安全与效率，经初步评估，拟定以下通行方案：\n\
              \n**1. 路线A（主推荐路线）**\n- **具体路径：** xx → xx高速 → xx\n- **优势分析：**\n    -\
              \ 道路条件优良，沿线限高、限宽及桥涵载荷均满足通行要求。\n    - 预计通行时间约3.5小时，效率较高。\n    - 已协调办理大件运输专用通行许可。\n\
              - **风险与难点：**\n    - 途经xx转弯处时，因转弯半径不足，需现场交警配合疏导交通。\n    - **【必要示意图：路线A走向及关键节点示意图】**\n\
              \n**2. 路线B（备用路线）**\n- **具体路径：** xx → xx高速 → xx高速 → xx\n- **优势分析：**\n\
              \    - 全程高速，道路平顺，车流相对稳定，易于大型车辆操控。\n- **风险与难点：**\n    - 总里程较长，预计将比路线A增加约30分钟运输时间。\n\
              \    - **【必要示意图：路线B与路线A的对比示意图，突出里程与时间差异】**\n\n**三、 安全管控重点提示**\n- **通行时段：**\
              \ 强烈建议避开早晚交通高峰，以最大限度降低对城市交通的影响。\n- **货物固定：** 需制定途中检查计划，在出发前、服务区停靠时定期检查货物绑扎与稳固情况，严防松动风险。\n\
              - **应急准备：** 针对推荐路线中的难点路段（如xx转弯处），建议提前部署应急力量与疏导方案。**【必要示意图：建议的交警疏导点位与交通组织示意图】**\n"
