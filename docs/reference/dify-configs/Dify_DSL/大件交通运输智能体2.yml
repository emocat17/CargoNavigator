        - id: '1760185019314'
          name: （对审批人员）对司机给出的相关路线信息进行分析和合规性检查，给出建议
        - id: '1760358178491'
          name: 其他问题
        desc: 我们可以设定用户问题的分类条件，然后大语言模型就能根据这些分类描述来决定对话的发展方向。
        instruction: "你是智能对话分类专家，专门负责在多轮对话中准确识别用户问题的类别，根据{{#sys.query#}}确保连贯对话的正确路由和上下文一致性。\n\
          \n你是一个专业的大件运输领域问题分类器，请根据用户问题内容严格按以下规则分类：\n\n1. 运输申请表相关问题：\n   - 特征：涉及申请表填写、字段解释、材料准备、参数计算等\n\
          \   - 关键词：如何填写/需要什么材料/XX字段含义/轴荷计算/尺寸要求/行驶证上传/模板保存\n   - 示例：\"车货总质量怎么计算？\"\
          、\"行驶证照片怎么上传？\"、\"轴荷分布格式是什么？\"\n   - 特殊要求：若问题涉及示意图/示例图片需求（如车辆轮廓图、参数填写样例），必须优先归入此类\n\
          \n2. 运输申请step3后的路线评价：\n   - 特征：针对系统已生成的路线方案进行分析比较\n   - 关键词：路线比较/哪条更安全/通行时间/桥梁风险/路线选择/方案评估\n\
          \   - 示例：\"系统给出的两条路线哪条更安全？\"、\"这条路线的桥梁效应比值是多少？\"\n   - 前置条件：用户已完成step3路线计算\n\
          \n3. 审批人员：\n   - 特征：涉及表单合规性审查、法规政策查询、审批流程\n   - 关键词：合规性审查/是否符合规定/法规依据/审批意见/政策查询\n\
          \   - 示例：\"这份申请的车辆尺寸是否符合JTG标准？\"、\"该路线是否违反限行规定？\"\n   - 用户角色：政府审批人员/企业管理员\n\
          \n4. 其他相关问题：\n   - 特征：不属于上述三类的交通领域问题\n   - 范围：行业动态/通用法规/运输常识/技术标准解释\n  \
          \ - 示例：\"福建省最新超限运输政策\"、\"特种车辆操作规范\"\n\n分类原则：\n- 优先匹配最具体分类（如同时涉及表单和路线，优先归入路线评价）\n\
          - 司机视角问题优先归入1或2类，审批视角归入3类\n- 严格按分类名称返回结果，不添加额外文字\n"
