            **数据调用：**\n- 实时交通管制系统\n- 施工计划数据库\n- 交通管理部门公告\n\n## 输出格式\n```\n[管制路段] 施工/管制信息：\n\
            - 管制类型：施工/活动/事故/天气\n- 影响范围：[具体路段描述]\n- 时间周期：[开始时间] ~ [结束时间]\n- 绕行建议：[替代路线描述]\n\
            - 更新日期：[信息发布日期]\n- 严重程度：[轻微/中等/严重]\n```\n\n## 特殊说明\n- 重点关注临时性、突发性管制信息\n\
            - 提供具体的绕行路线建议\n- 标注信息实时性和可信度\n\n---"
