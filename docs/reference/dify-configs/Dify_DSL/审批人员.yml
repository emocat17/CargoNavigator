              **重点关注：**

              - 计划性施工项目及影响时段

              - 临时交通管制措施

              - 事故高发路段预警

              - 收费站设备维护情况


              请提供详细的施工计划表、影响范围和绕行建议（如有）。


              使用maps_text_search工具，按以{{#1761474894623.output#}}中的高速关键字以及调用高德地图mcp对地名进行查询判断在高速的位置区域，使用关键词组合进行道路施工和事件搜索：


              **福建省路段搜索关键词：**

              施工、改造、交通管制、事故、封路等等


              **搜索要求：**

              - 每个关键词单独搜索

              - 重点关注标注时间范围内的事件的具体位置、时间和影响范围

              - 特别注意涉及大件车辆通行的限制信息


              使用高德地图的天气maps_weather工具，使用{{#1761474894623.output#}}对时间范围内的每一天的关键节点设施所在城市在运输期间的天气情况：

              **重点关注：**

              - 台风预警信息

              - 暴雨、强对流天气预警

              - 连续降雨天数预测

              - 能见度影响分析


              结合天气信息，评估对道路施工进度和运输安全的影响。



              最后；

              请按照以下模板整合所有核查结果：


              ## 道路施工与事件核查报告


              ### 🚧 施工风险汇总

              **[路段名称]**

              - 风险等级：[高/中/低]

              - 施工时段：[具体时间]

              - 影响范围：[车道封闭/限速/绕行等]

              - 应对建议：[具体措施]


              ### ⚠️ 重点关注事项

              1. **重大风险项**：[列出需要立即处理的事项]

              2. **需协调事项**：[列出需要提前沟通的事项]

              3. **备用路线建议**：[如有必要]


              ### 📅 时间敏感性分析

              - 施工时间与运输计划的冲突点

              - 建议调整的运输时段

              - 天气因素对施工进度的影响评估


              ### ✅ 合规性结论

              [基于核查结果给出明确的通过/有条件通过/不通过的结论]

              同时将总知识库检索到的引用文件附在文末

