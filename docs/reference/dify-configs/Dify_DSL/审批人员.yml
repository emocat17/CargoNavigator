            value:
            - '17608532131230'
            - result
          instruction:
            type: constant
            value: '你是一个专业的大件运输合规性校验专家。现在需要针对{{#1760852592238.Time#}}{{#1760843420947.Basic_info#}}{{#17608434253680.Route_info#}}进行路线通行建议；


              **运输基本信息：**

              - 基础信息：{{#1760843420947.Basic_info#}}

              - 运输时间：{{#1760852592238.Time#}}


              **核查任务：**

              请按照以下优先级进行道路施工与事件核查：


              1. **优先查询知识库/**：使用通行路线中提取的高速公路编号，查询福建省高速交通时间和道路施工情况知识库

              2. **高德地图补充验证**：对知识库未覆盖的路段或需要进一步验证的信息，使用高德地图MCP工具进行工具调用查询相关风险情况（包括可通行性、天气等）

              3. **重点关注路段**：特别关注申请中提到的关键节点枢纽，比如收费站、边界、高速切换出入口等


              **输出要求：**

              - 按路段分段报告施工/事件信息

              - 标注风险等级（高/中/低）

              - 提供具体的影响分析和建议措施

              - 如发现重大风险，立即给出预警


              请开始执行核查流程。'
          model:
            type: constant
            value:
              completion_params:
                thinking: false
                web_search: false
