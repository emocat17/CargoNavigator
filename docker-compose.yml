services:
  # ============================================
  # MaxKB 知识库 (可选 - 独立部署)
  # ============================================
  maxkb:
    image: registry.fit2cloud.com/maxkb/maxkb:latest
    container_name: cargo-maxkb
    restart: always
    ports:
      - "${MAXKB_PORT:-8080}:8080"
    volumes:
      - maxkb_data:/opt/maxkb
    environment:
      - TZ=Asia/Shanghai
    networks:
      - cargo-net
    profiles:
      - full
      - kb

  # ============================================
  # CargoNavigator Backend
  # ============================================
  backend:
    build: ./backend
    container_name: cargo-backend
    restart: always
    ports:
      - "${BACKEND_PORT:-9876}:9876"
    volumes:
      - cargo_data:/app/data
      - ./backend/spider/data:/app/spider/data  # Spider output persisted
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    networks:
      - cargo-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9876/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================
  # CargoNavigator Frontend (Vue 3 + Quasar)
  # ============================================
  frontend:
    build: ./frontend
    container_name: cargo-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-6789}:6789"
    environment:
      - TZ=Asia/Shanghai
      - VITE_API_BASE=http://backend:9876
    networks:
      - cargo-net
    depends_on:
      backend:
        condition: service_healthy

volumes:
  maxkb_data:
    driver: local
  cargo_data:
    driver: local

networks:
  cargo-net:
    name: cargo-net
    driver: bridge
